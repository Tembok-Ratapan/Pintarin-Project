<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1480" viewBox="0 0 1920 1480" role="img" aria-labelledby="title desc">
  <title id="title">PINTARIN Entity Relationship Diagram</title>
  <desc id="desc">ERD for the PINTARIN fullstack project database schema based on migrations 001 to 007.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 42px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #475569; }
      .section { font: 800 15px Arial, sans-serif; fill: #0f766e; letter-spacing: .08em; }
      .table { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .table-core { stroke: #0f766e; stroke-width: 2.5; }
      .head { fill: #0f766e; }
      .head-ai { fill: #2563eb; }
      .head-flow { fill: #7c3aed; }
      .head-log { fill: #334155; }
      .name { font: 800 18px Arial, sans-serif; fill: #ffffff; }
      .field { font: 500 14px Consolas, "Courier New", monospace; fill: #334155; }
      .pk { font: 800 14px Consolas, "Courier New", monospace; fill: #0f766e; }
      .fk { font: 800 14px Consolas, "Courier New", monospace; fill: #7c3aed; }
      .note { font: 500 13px Arial, sans-serif; fill: #64748b; }
      .legend { font: 700 14px Arial, sans-serif; fill: #334155; }
      .rel { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
      .rel-soft { fill: none; stroke: #94a3b8; stroke-width: 1.6; stroke-dasharray: 6 5; marker-end: url(#arrow); }
      .rel-label { font: 700 13px Arial, sans-serif; fill: #475569; paint-order: stroke; stroke: #f8fafc; stroke-width: 5; stroke-linejoin: round; }
      .caption { font: 600 13px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1480"/>

  <text class="title" x="80" y="70">PINTARIN ERD</text>
  <text class="subtitle" x="80" y="104">Database schema for education aid intelligence, AI risk scoring, CSR matching, and human-in-the-loop validation.</text>

  <g transform="translate(1420 44)">
    <rect x="0" y="0" width="420" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text class="legend" x="24" y="31">Legend</text>
    <text class="pk" x="24" y="58">PK</text>
    <text class="note" x="54" y="58">Primary key</text>
    <text class="fk" x="190" y="58">FK</text>
    <text class="note" x="220" y="58">Foreign key</text>
    <line x1="24" y1="78" x2="96" y2="78" class="rel"/>
    <text class="note" x="112" y="83">1:N relationship direction</text>
  </g>

  <!-- Relationship lines: core region hub -->
  <path class="rel" d="M 960 274 L 960 325 L 770 325 L 770 360"/>
  <text class="rel-label" x="790" y="316">regions 1:N schools</text>

  <path class="rel" d="M 870 274 L 870 322 L 520 322 L 520 360"/>
  <text class="rel-label" x="540" y="314">regions 1:N users</text>

  <path class="rel" d="M 1050 274 L 1050 322 L 1200 322 L 1200 360"/>
  <text class="rel-label" x="1110" y="314">regions 1:N predictions</text>

  <path class="rel" d="M 960 274 L 960 650 L 780 650 L 780 705"/>
  <text class="rel-label" x="793" y="641">regions 1:N indicators</text>

  <path class="rel" d="M 1050 274 L 1050 650 L 1200 650 L 1200 705"/>
  <text class="rel-label" x="1077" y="641">regions 1:N analytics</text>

  <!-- Relationship lines: user hub -->
  <path class="rel" d="M 520 584 L 520 650 L 430 650 L 430 705"/>
  <text class="rel-label" x="440" y="641">users 1:1 profiles</text>

  <path class="rel" d="M 430 584 L 430 1045 L 250 1045 L 250 1095"/>
  <text class="rel-label" x="265" y="1036">users submit/review requests</text>

  <path class="rel" d="M 610 584 L 610 1045 L 690 1045 L 690 1095"/>
  <text class="rel-label" x="625" y="1036">users submit/review CSR</text>

  <path class="rel" d="M 610 584 L 610 650 L 1590 650 L 1590 705"/>
  <text class="rel-label" x="1415" y="641">users 1:N logs</text>

  <!-- Relationship lines: school hub -->
  <path class="rel" d="M 770 584 L 770 1045 L 250 1045 L 250 1095"/>
  <text class="rel-label" x="410" y="1062">schools 1:N school requests</text>

  <path class="rel" d="M 860 584 L 860 1045 L 780 1045 L 780 1095"/>
  <text class="rel-label" x="785" y="1062">schools 1:N CSR targets</text>

  <path class="rel-soft" d="M 770 584 L 770 652 L 520 652 L 520 705"/>
  <text class="rel-label" x="540" y="667">schools 1:N profiles</text>

  <!-- Relationship lines: AI validation -->
  <path class="rel" d="M 1200 584 L 1200 1045 L 1210 1045 L 1210 1095"/>
  <text class="rel-label" x="1219" y="1036">predictions 1:N validations</text>

  <path class="rel-soft" d="M 610 584 L 610 1030 L 1120 1030 L 1120 1095"/>
  <text class="rel-label" x="927" y="1021">users as officers</text>

  <!-- Relationship lines: operational logs -->
  <path class="rel-soft" d="M 610 584 L 610 668 L 1590 668 L 1590 1095"/>
  <text class="rel-label" x="1430" y="684">users 1:N audit logs</text>

  <!-- USERS -->
  <g transform="translate(300 360)">
    <rect class="table table-core" x="0" y="0" width="320" height="224" rx="16"/>
    <rect class="head" x="0" y="0" width="320" height="46" rx="16"/>
    <path d="M 0 30 H 320 V 46 H 0 Z" fill="#0f766e"/>
    <text class="name" x="18" y="30">users</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">user_code, username, email</text>
    <text class="field" x="18" y="120">full_name, institution</text>
    <text class="field" x="18" y="144">role enum</text>
    <text class="fk" x="18" y="168">FK region_id -> regions.id</text>
    <text class="field" x="18" y="192">is_active, last_login</text>
    <text class="field" x="18" y="216">password_hash, timestamps</text>
  </g>

  <!-- REGIONS -->
  <g transform="translate(800 140)">
    <rect class="table table-core" x="0" y="0" width="320" height="134" rx="16"/>
    <rect class="head" x="0" y="0" width="320" height="46" rx="16"/>
    <path d="M 0 30 H 320 V 46 H 0 Z" fill="#0f766e"/>
    <text class="name" x="18" y="30">regions</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">region_code, name, city</text>
    <text class="field" x="18" y="120">population, geo, risk summary</text>
  </g>

  <!-- SCHOOLS -->
  <g transform="translate(680 360)">
    <rect class="table table-core" x="0" y="0" width="320" height="224" rx="16"/>
    <rect class="head" x="0" y="0" width="320" height="46" rx="16"/>
    <path d="M 0 30 H 320 V 46 H 0 Z" fill="#0f766e"/>
    <text class="name" x="18" y="30">schools</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">school_code, npsn, name</text>
    <text class="fk" x="18" y="120">FK region_id -> regions.id</text>
    <text class="field" x="18" y="144">level, ownership_status</text>
    <text class="field" x="18" y="168">accreditation</text>
    <text class="field" x="18" y="192">student/teacher/classroom</text>
    <text class="field" x="18" y="216">latitude, longitude</text>
  </g>

  <!-- PREDICTIONS -->
  <g transform="translate(1080 360)">
    <rect class="table" x="0" y="0" width="340" height="224" rx="16"/>
    <rect class="head-ai" x="0" y="0" width="340" height="46" rx="16"/>
    <path d="M 0 30 H 340 V 46 H 0 Z" fill="#2563eb"/>
    <text class="name" x="18" y="30">predictions</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">prediction_code, model_version</text>
    <text class="fk" x="18" y="120">FK region_id -> regions.id</text>
    <text class="field" x="18" y="144">data_year, prediction_year</text>
    <text class="field" x="18" y="168">predicted_score, priority_score</text>
    <text class="field" x="18" y="192">predicted/final label, confidence</text>
    <text class="field" x="18" y="216">ai_response, human review flags</text>
  </g>

  <!-- STAKEHOLDER PROFILES -->
  <g transform="translate(300 705)">
    <rect class="table" x="0" y="0" width="340" height="214" rx="16"/>
    <rect class="head-flow" x="0" y="0" width="340" height="46" rx="16"/>
    <path d="M 0 30 H 340 V 46 H 0 Z" fill="#7c3aed"/>
    <text class="name" x="18" y="30">stakeholder_profiles</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="fk" x="18" y="96">FK user_id -> users.id (unique)</text>
    <text class="fk" x="18" y="120">FK region_id -> regions.id</text>
    <text class="fk" x="18" y="144">FK school_id -> schools.id</text>
    <text class="field" x="18" y="168">profile_type, display_name</text>
    <text class="field" x="18" y="192">organization/contact, verified</text>
  </g>

  <!-- EDUCATION INDICATORS -->
  <g transform="translate(680 705)">
    <rect class="table" x="0" y="0" width="340" height="244" rx="16"/>
    <rect class="head-ai" x="0" y="0" width="340" height="46" rx="16"/>
    <path d="M 0 30 H 340 V 46 H 0 Z" fill="#2563eb"/>
    <text class="name" x="18" y="30">education_indicators</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">source_dataset, source_row_number</text>
    <text class="fk" x="18" y="120">FK region_id -> regions.id</text>
    <text class="field" x="18" y="144">kecamatan, year</text>
    <text class="field" x="18" y="168">population, vulnerable, PIP</text>
    <text class="field" x="18" y="192">sd_count, historical_risk_label</text>
    <text class="field" x="18" y="216">AI features: ratios, gap, urgency</text>
    <text class="field" x="18" y="240">UNQ source_dataset + row_number</text>
  </g>

  <!-- ANALYTICS SNAPSHOTS -->
  <g transform="translate(1080 705)">
    <rect class="table" x="0" y="0" width="340" height="244" rx="16"/>
    <rect class="head-ai" x="0" y="0" width="340" height="46" rx="16"/>
    <path d="M 0 30 H 340 V 46 H 0 Z" fill="#2563eb"/>
    <text class="name" x="18" y="30">analytics_snapshots</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">analytics_code, year</text>
    <text class="fk" x="18" y="120">FK region_id -> regions.id</text>
    <text class="field" x="18" y="144">population and vulnerable metrics</text>
    <text class="field" x="18" y="168">total_pip_aid, pip_coverage_pct</text>
    <text class="field" x="18" y="192">risk_status, risk_ranking</text>
    <text class="field" x="18" y="216">total_csr_programs/value</text>
    <text class="field" x="18" y="240">UNQ region_id + year</text>
  </g>

  <!-- CSR MATCH LOGS -->
  <g transform="translate(1480 705)">
    <rect class="table" x="0" y="0" width="320" height="184" rx="16"/>
    <rect class="head-log" x="0" y="0" width="320" height="46" rx="16"/>
    <path d="M 0 30 H 320 V 46 H 0 Z" fill="#334155"/>
    <text class="name" x="18" y="30">csr_match_logs</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="fk" x="18" y="96">FK user_id -> users.id</text>
    <text class="field" x="18" y="120">focus_area, budget_range</text>
    <text class="field" x="18" y="144">results_json</text>
    <text class="field" x="18" y="168">created_at</text>
  </g>

  <!-- SCHOOL NEED REQUESTS -->
  <g transform="translate(90 1095)">
    <rect class="table" x="0" y="0" width="360" height="244" rx="16"/>
    <rect class="head-flow" x="0" y="0" width="360" height="46" rx="16"/>
    <path d="M 0 30 H 360 V 46 H 0 Z" fill="#7c3aed"/>
    <text class="name" x="18" y="30">school_need_requests</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">request_code, category, title</text>
    <text class="fk" x="18" y="120">FK school_id -> schools.id</text>
    <text class="fk" x="18" y="144">FK region_id -> regions.id</text>
    <text class="fk" x="18" y="168">FK submitted_by -> users.id</text>
    <text class="fk" x="18" y="192">FK reviewed_by -> users.id</text>
    <text class="field" x="18" y="216">urgency, requested_value</text>
    <text class="field" x="18" y="240">status, review_note, evidence</text>
  </g>

  <!-- CSR AID PROPOSALS -->
  <g transform="translate(560 1095)">
    <rect class="table" x="0" y="0" width="420" height="284" rx="16"/>
    <rect class="head-flow" x="0" y="0" width="420" height="46" rx="16"/>
    <path d="M 0 30 H 420 V 46 H 0 Z" fill="#7c3aed"/>
    <text class="name" x="18" y="30">csr_aid_proposals</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">proposal_code, aid_name, aid_type</text>
    <text class="fk" x="18" y="120">FK submitted_by -> users.id</text>
    <text class="fk" x="18" y="144">FK target_region_id -> regions.id</text>
    <text class="fk" x="18" y="168">FK target_school_id -> schools.id</text>
    <text class="fk" x="18" y="192">FK final_school_id -> schools.id</text>
    <text class="fk" x="18" y="216">FK recommended_school_id -> schools.id</text>
    <text class="fk" x="18" y="240">FK reviewed/distributed_by -> users.id</text>
    <text class="field" x="18" y="264">status, recommendation_status, value</text>
  </g>

  <!-- PREDICTION VALIDATIONS -->
  <g transform="translate(1080 1095)">
    <rect class="table" x="0" y="0" width="360" height="214" rx="16"/>
    <rect class="head-ai" x="0" y="0" width="360" height="46" rx="16"/>
    <path d="M 0 30 H 360 V 46 H 0 Z" fill="#2563eb"/>
    <text class="name" x="18" y="30">prediction_validations</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="fk" x="18" y="96">FK prediction_id -> predictions.id</text>
    <text class="fk" x="18" y="120">FK officer_id -> users.id</text>
    <text class="field" x="18" y="144">action approve/override/flag</text>
    <text class="field" x="18" y="168">reason, corrected_label</text>
    <text class="field" x="18" y="192">validated_at</text>
  </g>

  <!-- AUDIT LOGS -->
  <g transform="translate(1480 1095)">
    <rect class="table" x="0" y="0" width="320" height="224" rx="16"/>
    <rect class="head-log" x="0" y="0" width="320" height="46" rx="16"/>
    <path d="M 0 30 H 320 V 46 H 0 Z" fill="#334155"/>
    <text class="name" x="18" y="30">audit_logs</text>
    <text class="pk" x="18" y="72">PK id</text>
    <text class="field" x="18" y="96">log_code, action</text>
    <text class="fk" x="18" y="120">FK user_id -> users.id</text>
    <text class="field" x="18" y="144">user_code, username, source_role</text>
    <text class="field" x="18" y="168">target_table, target_code</text>
    <text class="field" x="18" y="192">ip_address, status, duration_ms</text>
    <text class="field" x="18" y="216">occurred_at, created_at</text>
  </g>

  <g transform="translate(80 1400)">
    <text class="caption" x="0" y="0">Generated from PINTARIN SQL migrations 001-007. Core entities: regions, users, schools. AI entities: education_indicators, predictions, analytics_snapshots, prediction_validations. Operational workflow: school_need_requests and csr_aid_proposals.</text>
    <text class="caption" x="0" y="26">Note: Some workflow tables contain multiple foreign keys to the same parent table, shown inside each table to keep the diagram readable for presentation slides.</text>
  </g>
</svg>
